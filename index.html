<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Saya</title>
  <style>
    /* ===== KONFIGURASI — edit di sini ===== */
    :root {
      --nama: "Nama Kamu";
      --bio: "Halo! Hubungi saya lewat salah satu platform di bawah.";
    }
    /* ======================================= */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f0f4f8;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px 64px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 24px;
      padding: 40px 28px 36px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      text-align: center;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
    }

    .nama {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .bio {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .links { display: flex; flex-direction: column; gap: 12px; }

    .btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-radius: 14px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
    }

    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
    .btn:active { transform: translateY(0); box-shadow: none; }

    .btn-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-icon svg { width: 22px; height: 22px; }

    .btn-label {
      flex: 1;
      text-align: left;
      font-size: 15px;
      font-weight: 600;
    }

    .btn-arrow { font-size: 18px; opacity: 0.5; }

    /* WhatsApp */
    .btn-wa { background: #e7f8ee; color: #128C7E; }
    .btn-wa .btn-icon { background: #25D366; }
    .btn-wa .btn-icon svg { fill: #fff; }

    /* Dana */
    .btn-dana { background: #e6f0ff; color: #0057B8; }
    .btn-dana .btn-icon { background: #108EE9; }
    .btn-dana .btn-icon svg { fill: #fff; }

    /* Instagram */
    .btn-ig { background: #fce4f3; color: #833AB4; }
    .btn-ig .btn-icon { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    .btn-ig .btn-icon svg { fill: #fff; }

    /* Telegram */
    .btn-tg { background: #e3f4fc; color: #0088cc; }
    .btn-tg .btn-icon { background: #229ED9; }
    .btn-tg .btn-icon svg { fill: #fff; }

    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #9ca3af;
    }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      body { background: #111827; }
      .card { background: #1f2937; box-shadow: 0 4px 32px rgba(0,0,0,0.4); }
      .nama { color: #f9fafb; }
      .bio { color: #9ca3af; }
      .btn-wa { background: #0d2b1a; color: #4ade80; }
      .btn-dana { background: #0d1b3e; color: #60a5fa; }
      .btn-ig { background: #2d1036; color: #e879f9; }
      .btn-tg { background: #0c2233; color: #38bdf8; }
      .footer { color: #4b5563; }
    }

    @media (max-width: 480px) {
      body { padding: 24px 12px 48px; }
      .card { padding: 32px 20px 28px; border-radius: 20px; }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- ====== EDIT BAGIAN INI ====== -->
  <div class="avatar">NK</div>
  <!-- Ganti "NK" dengan 2 huruf inisial nama kamu -->

  <div class="nama">Nama Kamu</div>
  <!-- Ganti dengan nama kamu -->

  <div class="bio">Halo! Hubungi saya lewat salah satu platform di bawah.</div>
  <!-- Ganti dengan bio kamu -->
  <!-- ================================ -->

  </div>

  <div class="footer">© 2025 · Dibuat dengan ❤</div>

</div>

</body>
</html>
